<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nem Colei</title>
  <link rel="stylesheet" href="index.css">
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-image: linear-gradient(45deg, rgb(20, 96, 97), rgb(159, 255, 49));
    }
    .login-card {
      background-color: rgba(3, 23, 24, 0.753);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 75px;
      border-radius: 17px;
      color: white;
      text-align: center;
      min-width: 320px;
    }
    .logo {
      display: block;
      margin: 0 auto 20px;
      width: 180px;
      max-width: 100%;
      border-radius: 20px;
    }
    input {
      padding: 15px; 
      border: none;
      border-radius: 6px;
      font-size: 15px;

    }
    button {
      padding: 15px;
      border: none;
      border-radius: 5px;
      font-size: 15px;
      background-color: rgb(0, 0, 0);
      color: white;
      width: 50%;  
      
    }
    button:hover {
        background-color: rgb(38, 228, 101);
        color: white;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="imagem/63 Sem Título_20260501204731 (1).png" alt="Logo Nem Colei" class="logo">
    <h1>Nem Colei</h1>
    <input type="text" placeholder="Digite seu nome">
    <br><br>
    <input type="password" placeholder="Digite sua senha">
    <br><br>
    <button>Entrar</button>
  </div>
</body>
</html>
